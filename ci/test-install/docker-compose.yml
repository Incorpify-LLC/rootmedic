version: "3.8"

# CI test harness for install.sh
# Brings up:
#   loki       — real Loki instance (log storage)
#   mock-llm   — OpenAI-compatible mock LLM (zero dependencies, stdlib only)
#   install-target — Ubuntu container that runs install.sh in non-interactive mode
#
# Run:
#   cd ci/test-install
#   docker compose up --build --abort-on-container-exit --exit-code-from install-target

services:

  loki:
    image: grafana/loki:2.9.0
    container_name: ci-loki
    command: -config.file=/etc/loki/config.yaml
    volumes:
      - ../../Deployment/loki-config.yaml:/etc/loki/config.yaml:ro
    ports:
      - "3100"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12

  mock-llm:
    build:
      context: mock-llm
      dockerfile: Dockerfile
    container_name: ci-mock-llm
    ports:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 6

  install-target:
    build:
      context: .
      dockerfile: Dockerfile.install-target
    container_name: ci-install-target
    depends_on:
      loki:
        condition: service_healthy
      mock-llm:
        condition: service_healthy
    volumes:
      # Mount the entire repo as /repo so the installer can copy it without hitting GitHub
      - ../../:/repo:ro
    environment:
      LOKI_URL: "http://loki:3100"
      LITELLM_BASE_URL: "http://mock-llm:8080"
      LITELLM_MODEL: "mock-model"
      LITELLM_API_KEY: "ci-test-key"
      LLM_TYPE: "external"
      ROOTMEDIC_NON_INTERACTIVE: "1"
      START_LOKI_IF_DOWN: "0"
      INSTALL_DIR: "/opt/rootmedic"
      REPO_DIR: "/repo"
