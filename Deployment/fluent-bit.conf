[SERVICE]
    Flush           5
    Log_Level       info
    Daemon          Off
    Parsers_File    /etc/fluent-bit/parsers.conf
    HTTP_Server     Off

# Read from systemd journal
[INPUT]
    Name              systemd
    Tag               host.*
    Read_From_Tail    On
    Strip_Underscores On

# Keep only error (priority 3) and warning (priority 4) entries
[FILTER]
    Name    grep
    Match   *
    Regex   PRIORITY ^[34]$

# Forward to Loki
[OUTPUT]
    Name            loki
    Match           *
    Host            ${LOKI_HOST}
    Port            ${LOKI_PORT}
    Labels          job=fluent-bit,host=${HOSTNAME}
    Label_Keys      $SYSLOG_IDENTIFIER,$_SYSTEMD_UNIT
    Line_Format     json
    Auto_Kubernetes_Labels Off
